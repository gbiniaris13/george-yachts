<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7DA6F"/>
      <stop offset="40%" stop-color="#E6C77A"/>
      <stop offset="70%" stop-color="#C9A24D"/>
      <stop offset="100%" stop-color="#A67C2E"/>
    </linearGradient>
    <linearGradient id="goldSubtle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C77A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A67C2E" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Deep navy / black square with rounded corners -->
  <rect width="64" height="64" rx="10" fill="#050505"/>

  <!-- Thin gold inner frame -->
  <rect x="3" y="3" width="58" height="58" rx="8" fill="none"
        stroke="url(#goldSubtle)" stroke-width="0.9"/>

  <!-- Trajan/Cinzel-derived "G" — bold roman cap, modulated stroke,
       sits on a centered baseline. Built as a path so it renders
       crisply at 16×16 favicon size. -->
  <path
    d="M 32 12
       C 21 12, 14 19.5, 14 32
       C 14 44.5, 21 52, 32 52
       C 38 52, 43 50, 47 47
       L 47 33
       L 33 33
       L 33 38
       L 41 38
       L 41 44
       C 39 45.5, 36 46.5, 33 46.5
       C 25 46.5, 21 41, 21 32
       C 21 23, 25 17.5, 33 17.5
       C 38 17.5, 42 19.5, 45 23
       L 47 19
       C 43 14.5, 38 12, 32 12 Z"
    fill="url(#gold)"/>

  <!-- Tiny gold serif tick beneath the G — Trajan inscription detail -->
  <line x1="28" y1="56" x2="36" y2="56" stroke="url(#gold)"
        stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
</svg>
